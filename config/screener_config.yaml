database:
  path: db/nifty100.db

filters:
  roe_min: 15
  debt_to_equity_max: 1
  free_cash_flow_min: 0
  revenue_cagr_5yr_min: 10
  pat_cagr_5yr_min: 10
  operating_profit_margin_min: 15
  pe_max: 25
  pb_max: 3
  dividend_yield_min: 1
  interest_coverage_min: 2
  market_cap_min: 1000
  net_profit_min: 100
  eps_cagr_5yr_min: 10
  asset_turnover_min: 0.5
  sales_min: 500

sorting:
  column: composite_quality_score
  ascending: false

output:
  excel: output/screener_output.xlsx

presets:

  quality_compounder:
    roe_min: 15
    debt_to_equity_max: 1.0
    free_cash_flow_min: 0
    revenue_cagr_5yr_min: 10

  value_pick:
    debt_to_equity_max: 2.0
    # pe_ratio_max: 20
    # pb_ratio_max: 3
    # dividend_yield_min: 1

  growth_accelerator:
    pat_cagr_5yr_min: 20
    revenue_cagr_5yr_min: 15
    debt_to_equity_max: 2

  dividend_champion:
    dividend_payout_ratio_pct_max: 80
    free_cash_flow_min: 0
    # dividend_yield_min: 2

  debt_free_blue_chip:
    debt_to_equity_exact: 0
    roe_min: 12
    # sales_min: 5000

  turnaround_watch:
    free_cash_flow_min: 0
    # revenue_cagr_3yr_min: 10
    # debt_declining: true